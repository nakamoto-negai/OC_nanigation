# ローカル LAN 向け HTTPS 配信用 nginx 設定。
#
# スマホ実機で AR（カメラ・コンパス・GPS）を試すには HTTPS（または localhost）が必須。
# 自己署名証明書で 443 を TLS 配信し、同じ WiFi のスマホから https://<PCのLAN IP> で開く。
# 3000(HTTP) は PC の localhost 開発用にそのまま残す。
#
# docker-compose.https.yml でこのファイルと certs/ をマウントして使う。

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }
    location /api/ {
        client_max_body_size 20m;
        proxy_pass http://backend:8080;
    }
    location /uploads/ { proxy_pass http://backend:8080; }
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    location / { try_files $uri $uri/ /index.html; }
    location /api/ {
        client_max_body_size 20m;
        proxy_pass http://backend:8080;
    }
    location /uploads/ { proxy_pass http://backend:8080; }
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
