server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        client_max_body_size 20m;
        proxy_pass http://backend:8080;
    }

    location /uploads/ {
        proxy_pass http://backend:8080;
    }
}
