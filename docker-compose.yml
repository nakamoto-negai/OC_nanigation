version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nav
      POSTGRES_PASSWORD: nav_pass
      POSTGRES_DB: navigation
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nav -d navigation"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: nav
      DB_PASSWORD: nav_pass
      DB_NAME: navigation
      UPLOAD_DIR: /uploads
      ADMIN_PASSWORD: admin
      ADMIN_SECRET: dev-secret-change-in-production
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      # ホスト側のHTTPポートは FRONTEND_HTTP_PORT で変更可（既定3000）。
      # 3000 が他アプリと衝突する場合に逃がせる。コンテナ内は常に3000。
      - "${FRONTEND_HTTP_PORT:-3000}:3000"
    # 注: VITE_API_URL は設定しない。未設定だとフロントは相対パス（/api, /ws, /uploads）と
    # window.location.host を使うため、nginx(:3000) の同一オリジンプロキシ経由で動作する。
    # これにより localhost でも LAN でも ngrok でも、URL を問わずそのまま機能する。
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
