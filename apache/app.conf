# HTTP → HTTPS リダイレクト
<VirtualHost *:80>
    ServerName oc-routenavi.cc.it-hiroshima.ac.jp
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# HTTPS リバースプロキシ
<VirtualHost *:443>
    ServerName oc-routenavi.cc.it-hiroshima.ac.jp
    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/server.crt
    SSLCertificateKeyFile /etc/ssl/private/server.key

    # アップロードファイル（Apacheが直接配信）
    Alias /uploads /var/www/uploads
    <Directory /var/www/uploads>
        Options -Indexes
        AllowOverride None
        Require all granted
        Header set Cache-Control "public, max-age=604800"
        ExpiresActive On
        ExpiresByType image/jpeg "access plus 7 days"
        ExpiresByType image/png  "access plus 7 days"
        ExpiresByType image/webp "access plus 7 days"
        ExpiresByType image/gif  "access plus 7 days"
    </Directory>

    # WebSocket（/api/ より前に書く）
    ProxyPass        /ws/ ws://backend:8080/ws/
    ProxyPassReverse /ws/ ws://backend:8080/ws/

    # バックエンドAPI（アップロード上限 20MB）
    <Location /api/>
        LimitRequestBody 20971520
    </Location>
    ProxyPass        /api/ http://backend:8080/api/
    ProxyPassReverse /api/ http://backend:8080/api/

    # フロントエンド（それ以外すべて）
    ProxyPass        / http://frontend:80/
    ProxyPassReverse / http://frontend:80/

    ProxyPreserveHost On
</VirtualHost>